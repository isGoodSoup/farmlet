game.end.best=Your {0} days have been nothing short of legendary! \
  \nThe villagers sing your praises, \nand your farm thrives like a \
  storybook wonder. \nEven the sun seems to shine brighter for you. \
  \nTake a bow, kid, \nyour name will be remembered \
  in the seasons to come!
game.end.good=Your {0} days are up! What a good season has been. \nDo \
  you ever wonder if by chance it was all you and less of me? \nRemember \
  the time when you... Oh, would you look at the time! \nI must go now, proud \
  of you, kid. See you next time!
game.end.bad=Your {0} days are over... and well, it could have gone better. \
  \nSome crops survived, some didn''t. \nThe animals look at you with mild \
  disappointment, \nand the barn seems quieter than usual. \
  \nBetter luck next season, farmer. \
  \nMaybe next time the soil will smile upon you.
game.end.worst=You reached your journey's end. The world apocalypse \nhas \
  begun and your farm has turned rotten and dry. \nYou look up to the sky \
  and see the red clouds and \nblood moon rising... \nThe crops are smell of \
  wither and the ending is near. \nIt''s game over, {0}


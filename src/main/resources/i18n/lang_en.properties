game.intro=Last night, your grandfather passed away. Along with the grief \
  comes a letter and an inheritance: his farm. But the land is not a gift; \
  it groans under mountains of debt, overgrown with weeds, and whispering of \
  forgotten dreams. You stand at the edge of the fields, wondering if you \
  can breathe life back into the crumbling homestead. Can you survive the \
  first season, master the soil, and honor his legacy or will this farm \
  swallow you whole?


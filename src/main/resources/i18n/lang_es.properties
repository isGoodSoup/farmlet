game.end.best=ˇTus {0} días no han sido nada pero legendarios! \
  \nLos villanos cantan tus hazańas, \ny la granja resucita como un \
  cuento de hadas. \nHasta el sol parece ser más brillante para ti. \
  \nArrodíllate, hijo/a, \nˇtu nombre será recordado por las épocas a llegar!
game.end.good=ˇTus {0} días han terminado! Qué buena temporada ha sido. \
  \nżAlguna vez te preguntas si fue más mérito tuyo que mío? \nRecuerda aquella vez cuando... \
  ˇOh, mira la hora! \nDebo irme ahora, orgulloso de ti, hijo. ˇHasta la próxima!
game.end.bad=Tus {0} días han terminado... y bueno, podría haberte ido mejor. \
  \nAlgunos cultivos sobrevivieron, otros no fueron tan afortunados. \nLos \
  animales te miran con decepción, \ny la granja parece estar más callada. \
  \nMucha suerte la próxima vez, hijo/a. \nQuizás las tierras te sonrian.
game.end.worst=Has llegado al final de tu viaje. El apocalipsis \nha comenzado\
  \ y tu granja se ha vuelto podrida y seca. \nMiras al cielo y ves nubes rojas y \nla \
  luna de sangre elevándose... \nLos cultivos huelen a marchitez y el final está cerca. \
  \nˇJuego terminado, {0}!


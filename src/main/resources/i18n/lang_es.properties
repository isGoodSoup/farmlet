game.intro=Anoche falleció tu abuelo. Junto con el dolor, llega una carta y una herencia: su granja. \
  Pero la tierra no es un regalo; gime bajo montańas de deudas, cubierta de maleza y \
  susurrando sueńos olvidados. Estás al borde de los campos, preguntándote si podrás devolverle la vida \
  a la granja en ruinas. żPodrás sobrevivir la primera temporada, dominar la tierra y honrar su legado, \
  o esta granja te devorará por completo?

